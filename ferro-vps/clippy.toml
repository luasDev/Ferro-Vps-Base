# Lint configuration thresholds for the Ferro-VPS workspace.
# These values are intentionally conservative and documented in
# docs/CONVENTIONS.md.
too-many-arguments-threshold = 8
cognitive-complexity-threshold = 30
type-complexity-threshold = 250

# The `clippy::unwrap_used` and `clippy::expect_used` lints are enabled as
# warnings across the workspace. Tests are allowed to use them so unit tests
# stay terse; production code must never unwrap/expect outside the documented
# exceptions.
allow-unwrap-in-tests = true
allow-expect-in-tests = true

# Identifiers that are allowed to appear unquoted inside documentation
# comments. The trailing ".." entry keeps Clippy's built-in default allow-list
# in addition to the project-specific terms below.
doc-valid-idents = [
